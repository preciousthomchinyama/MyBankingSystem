<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        form {
            background-color: white;
            border-radius: 10px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        form h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.2);
            background-color: #f8f9ff;
        }
        
        input::placeholder {
            color: #999;
        }
        
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(102, 126, 234, 0.3);
        }
        
        button:active {
            transform: translateY(0);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.2);
        }
    </style>
</head>
<body>
    <form class="login-form" method="post">
        <h2>Admin Login</h2>
        <input type="text" id="adminId" placeholder="Admin ID"> 
        <input type="password" id="admin-password" placeholder="Password">
        <button type="submit" id="login">Login</button>
    </form>
    
    <script>
        document.addEventListener("submit", e=>{
            e.preventDefault();
            if(e.target.classList.contains("login-form")){
                const admin_id = document.getElementById("adminId").value;
                const password = document.getElementById("admin-password").value;

                if(password.length < 8 ){
                    alert("X password should be greater than 8 characters!!");
                    return;
                }

                const form_data = new FormData();
                form_data.append('admin_id' , admin_id);
                form_data.append('password',password);
                fetch('login.php',{
                    method : 'POST',
                    body : form_data
                })
                .then(response => response.json())
                .then(data => {
                    alert(data.login_msg);
                    if(data.flag === 'valid_user'){
                       if(data.priv === "admin"){
                            window.location.href = "../admin/index.php";
                        }else if(data.priv === "guest_user"){
                            window.location.href = "../guest.php";
                        }else{
                            return;
                        } 
                    }
                });
            }
        });
    </script>
</body>
</html>
